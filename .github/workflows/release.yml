name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.resolve-tag.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve-tag.outputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag exists locally
        run: git rev-parse --verify "refs/tags/${{ steps.resolve-tag.outputs.release_tag }}"

      - name: Verify tag commit is merged into default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch --no-tags origin "${DEFAULT_BRANCH}"
          TAG_COMMIT="$(git rev-parse HEAD)"
          git merge-base --is-ancestor "$TAG_COMMIT" "origin/${DEFAULT_BRANCH}"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install pinned CI dependencies
        run: python -m pip install --require-hashes -r constraints-dev.txt

      - name: Install package
        run: python -m pip install --no-deps -e .

      - name: Run tests
        run: pytest

      - name: Build artifacts
        run: python -m build --sdist --wheel --no-isolation

      - name: Verify artifacts
        run: python tools/verify_package_artifacts.py --inspection-log release-metadata/release-package-inspection.md

      - name: Generate release SBOM
        run: python tools/generate_release_sbom.py --output release-metadata/embit-sbom.cdx.json

      - name: Generate release checksums
        working-directory: dist
        run: |
          mkdir -p ../release-metadata
          sha256sum -- *.tar.gz *.whl > ../release-metadata/SHA256SUMS

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle-${{ steps.resolve-tag.outputs.release_tag }}
          path: |
            dist/*.tar.gz
            dist/*.whl
            release-metadata/SHA256SUMS
            release-metadata/embit-sbom.cdx.json
            release-metadata/release-package-inspection.md

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build
    environment:
      name: pypi
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Download validated release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-bundle-${{ needs.build.outputs.release_tag }}
          path: release-bundle

      - name: Verify artifact hashes
        working-directory: release-bundle/dist
        run: sha256sum --check ../release-metadata/SHA256SUMS

      - name: Generate sdist build attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-bundle/dist/*.tar.gz

      - name: Generate wheel build attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-bundle/dist/*.whl

      - name: Publish release artifacts
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: release-bundle/dist
